# Path B: vector search + limited reranking (no tags)
# Versioned config - version is required
version: "1"
name: path_b_v1

vertex:
  project: ${VERTEX_PROJECT}
  region: ${VERTEX_REGION}
  index_endpoint_id: ${VERTEX_INDEX_ENDPOINT_ID}
  deployed_index_id: ${VERTEX_DEPLOYED_INDEX_ID}

embedding:
  model: gemini-embedding-001
  output_dimensionality: 1536
  task_type: RETRIEVAL_DOCUMENT

filters:
  document_authority_level: ${RAG_FILTER_AUTHORITY_LEVEL}
  document_payer: ${RAG_FILTER_PAYER}
  document_state: ${RAG_FILTER_STATE}
  document_program: ${RAG_FILTER_PROGRAM}
  # Restrict Vertex to hierarchical chunks only (excludes fact-level)
  source_type_allow: [hierarchical]

postgres_url: ${CHAT_RAG_DATABASE_URL}
# RAG DB for J/P/D tagger (lexicon + document_tags). Uncomment to use separate RAG DB; else uses RAG_DATABASE_URL or postgres_url.
# rag_database_url: ${RAG_DATABASE_URL}

top_k: 10

rerank:
  apply_hierarchy_sort: false
  confidence_min: null
  reranker_config: configs/reranker_v1.yaml
