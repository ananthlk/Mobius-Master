# Reranker config: additive weighted scoring for retrieval chunks.
# Use raw values (no min-max norm) so actual semantics drive ranking.
version: "1"
name: reranker_v1

combination:
  method: additive

# Post-rerank decay: per-category cutoff (decay within each retrieval source).
# decay = rerank_score[i] / top_score_in_category; keep if >= threshold.
# Each category has different score scales; universal decay incorrectly filters e.g. BM25 sentences.
post_rerank:
  decay_threshold: 0.6  # fallback if category not in decay_by_category
  decay_by_category:
    bm25_sentence: 0.6
    bm25_paragraph: 0.6
    vector: 0.6

signals:
  score:
    weight: 0.30
    formula: direct
    normalize: false

  tag_match:
    weight: 0.25
    formula: direct_context
    normalize: false
    params:
      j_weight: 0.4
      d_weight: 0.4
      p_weight: 0.2
      p_count_weight: 0.4
      d_count_weight: 0.6
      count_scale: 0.4
      intensity_scale: 0.3
      homogeneity_scale: 0.2
      context_weight: 0.2
      doc_decay_factor: 0.1

  authority_level:
    weight: 0.15
    formula: rank
    normalize: false
    params:
      contract_source_of_truth: 1.0
      operational_suggested: 0.65
      fyi_not_citable: 0.35
      unknown: 0.0

  length:
    weight: 0.10
    formula: floor
    normalize: false
    params:
      min_chars: 50
