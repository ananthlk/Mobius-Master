<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mobius Welcome — Preview Harness</title>
<style>
  /* Tokens inlined for iframe self-containment (canonical: mobius-design/tokens.css) */
  :root{--violet:#7c3aed;--violet-soft:rgba(124,58,237,.10);--bg:#f8f7fb;--surface:#fff;--surface-2:#f1eff7;--text:#1c1a27;--muted:#6b6880;--border:#e2dff0;--live:#16a34a;--planned:#94a3b8;--amber:#d97706}
  @media (prefers-color-scheme: dark){:root{--bg:#141220;--surface:#1d1a2e;--surface-2:#262238;--text:#eceaf6;--muted:#9d99b5;--border:#332e4d;--live:#4ade80;--planned:#64748b;--amber:#fbbf24}}
  :root[data-theme="light"]{--bg:#f8f7fb;--surface:#fff;--surface-2:#f1eff7;--text:#1c1a27;--muted:#6b6880;--border:#e2dff0;--live:#16a34a;--planned:#94a3b8}
  :root[data-theme="dark"]{--bg:#141220;--surface:#1d1a2e;--surface-2:#262238;--text:#eceaf6;--muted:#9d99b5;--border:#332e4d;--live:#4ade80;--planned:#64748b}
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  header{padding:9px 16px;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  header h1{font-size:14px;margin:0;font-weight:650}
  header h1 b{color:var(--violet)}
  header .note{color:var(--muted);font-size:11.5px}
  #controls{display:flex;gap:10px;flex-wrap:wrap;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface)}
  #controls label{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:2px}
  #controls select,#controls input{font:inherit;font-size:13px;color:var(--text);background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:5px 8px}
  main{max-width:620px;margin:24px auto;padding:0 16px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:22px 24px 18px;box-shadow:0 3px 16px rgba(28,26,39,.09);border-top:3px solid var(--violet);position:relative;overflow:hidden}
  .enter{animation:pop .45s cubic-bezier(.2,.9,.3,1.2) both}
  .enter.d1{animation-delay:.08s}.enter.d2{animation-delay:.16s}.enter.d3{animation-delay:.26s}.enter.d4{animation-delay:.36s}
  @keyframes pop{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:none}}
  h2{margin:0;font-size:21px;display:flex;align-items:center;gap:8px}
  h2 .wave{display:inline-block;animation:wave 1.8s ease-in-out 1;transform-origin:70% 70%}
  @keyframes wave{0%,100%{transform:rotate(0)}15%{transform:rotate(18deg)}30%{transform:rotate(-8deg)}45%{transform:rotate(14deg)}60%{transform:rotate(-4deg)}}
  .hook{font-size:16.5px;margin:8px 0 2px;font-weight:600}
  .hooksub{color:var(--muted);margin:0 0 14px;font-size:13.5px}
  /* flip chip */
  .flip{perspective:700px;margin:6px 0 14px;cursor:pointer;user-select:none}
  .flip-inner{position:relative;transition:transform .5s;transform-style:preserve-3d;min-height:52px}
  .flip.on .flip-inner{transform:rotateX(180deg)}
  .face{position:absolute;inset:0;backface-visibility:hidden;border-radius:12px;display:flex;align-items:center;gap:10px;padding:10px 14px;font-size:14px}
  .face.q{background:var(--violet-soft);color:var(--text);font-weight:600}
  .face.q .tap{margin-left:auto;font-size:11px;color:var(--violet);font-weight:650;letter-spacing:.04em;white-space:nowrap}
  .face.a{background:color-mix(in srgb,var(--live) 10%,transparent);transform:rotateX(180deg)}
  /* try-it chips + composer */
  .tryits{display:flex;gap:8px;flex-wrap:wrap;margin:4px 0 10px}
  .try{border:1.5px solid var(--violet);color:var(--violet);background:transparent;border-radius:999px;padding:7px 14px;font:inherit;font-size:13.5px;cursor:pointer;transition:transform .12s, background .12s}
  .try:hover{transform:translateY(-2px) scale(1.03);background:var(--violet-soft)}
  .try:active{transform:scale(.97)}
  .composer{display:flex;align-items:center;gap:9px;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:10px 14px;margin:4px 0 16px;min-height:42px}
  .composer .cursor{width:2px;height:17px;background:var(--violet);animation:blink 1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}
  .composer .ghost{color:var(--muted);font-size:13.5px}
  .composer .send{margin-left:auto;color:var(--violet);font-weight:700}
  /* pillars tabs */
  .tabs{display:flex;gap:6px;margin:2px 0 10px}
  .tabs button{border:1px solid var(--border);background:var(--surface-2);color:var(--muted);border-radius:999px;padding:5px 13px;font:inherit;font-size:12.5px;cursor:pointer;font-weight:600}
  .tabs button.on{background:var(--violet);border-color:var(--violet);color:#fff}
  .pillar{min-height:84px}
  .pillar ul{margin:4px 0 0;padding-left:20px}
  .pillar li{margin:5px 0;animation:pop .3s both}
  .pillar li:nth-child(2){animation-delay:.06s}.pillar li:nth-child(3){animation-delay:.12s}
  .pillar .planned li{color:var(--muted)}
  .pillar .steer{border-left:3px solid var(--live);padding:2px 0 2px 11px;font-size:14px;margin-top:4px}
  .wish{margin-top:8px;border:1px dashed var(--live);color:var(--live);background:transparent;border-radius:999px;padding:5px 13px;font:inherit;font-size:12.5px;cursor:pointer}
  .toast{position:absolute;left:50%;transform:translateX(-50%);bottom:14px;background:var(--text);color:var(--bg);border-radius:999px;padding:7px 16px;font-size:12.5px;opacity:0;transition:opacity .25s;pointer-events:none}
  .toast.show{opacity:1}
  /* setup dots */
  .setup{display:flex;gap:16px;align-items:center;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);flex-wrap:wrap}
  .setup .lbl{font-size:12px;color:var(--muted);font-weight:650;letter-spacing:.05em;text-transform:uppercase}
  .step{display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none;font-size:13px;color:var(--muted)}
  .step .dot{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;transition:all .2s}
  .step.done{color:var(--text)}
  .step.done .dot{background:var(--live);border-color:var(--live);transform:scale(1.12)}
  .skip{margin-left:auto;background:none;border:none;color:var(--muted);font:inherit;font-size:12px;cursor:pointer;text-decoration:underline}
  canvas#confetti{position:fixed;inset:0;pointer-events:none;z-index:9}
  .meta{color:var(--muted);font-size:11.5px;margin-top:12px;text-align:center}
</style>
</head>
<body>
<header>
  <h1>Welcome Card <b>·</b> Preview Harness <span style="font-weight:400;color:var(--muted)">(fun edition)</span></h1>
  <span class="note">cheat code in product: <code>/welcome</code> · <code>?welcome=1</code></span>
</header>
<div id="controls">
  <div><label>Name</label><input id="cName" value="Ananth" size="8"></div>
  <div><label>Arrival</label><select id="cArrival"><option value="invited">invited</option><option value="self_serve">self-serve</option></select></div>
  <div><label>Persona</label><select id="cPersona"></select></div>
  <div><label>Experience</label><select id="cExp"><option>beginner</option><option>regular</option><option>expert</option></select></div>
</div>
<main><div id="card" class="card"></div>
<p class="meta">Everything clickable is honest: Today = live, Coming = really not built, wishes really file. Spec: docs/welcome-onboarding-spec.md</p>
</main>
<canvas id="confetti"></canvas>
<script>
"use strict";
/* PERSONA CONTENT PACK v2 — short, punchy, interactive. Same honesty gates. */
const PERSONAS = [
 {key:"claims", label:"Billing / claims",
  hook:"Denials, codes, timely filing — answered with receipts.",
  sub:"Ask like you'd ask a coworker. Get the answer plus the exact policy page it came from.",
  fearQ:"“What if it gets it wrong — it's my name on the claim.”",
  fearA:"No source, no claim. Every answer shows receipts — click any citation. Unsure? It says so.",
  tryits:["What's the timely filing rule for Sunshine?","Is Dr. Chen enrolled with Medicaid?","Remind me to rework that H0019 denial"],
  today:["Cited policy answers in seconds","Enrollment checks before you bill","Plain-word reminders that nudge you back"],
  coming:["A per-claim validation ledger","Instant answers for your team's repeat questions"],
  tour:["chat:complete-a-task","▶ Watch: track a follow-up"]},
 {key:"credentialing", label:"Credentialing coordinator",
  hook:"“Is this provider payable?” — one question, whole answer.",
  sub:"NPPES, PML, compliance flags, readiness — on one card. The roster screens are still there when you want depth.",
  fearQ:"“Ugh, another system to learn.”",
  fearA:"Nothing to learn. You just ask. Chat is the fast way into the tools you already know.",
  tryits:["How is our panel doing?","NPPES errors for Acme Health?","Show me the credentialing report"],
  today:["Provider or whole-panel status from one question","Ghost-billing + enrollment-gap checks","Runs create follow-up tasks automatically"],
  coming:["Tasks that close themselves when a run completes","A richer credentialing workspace"],
  tour:["chat:operations-suite-tour","▶ Watch: the ops suite"]},
 {key:"frontdesk", label:"Front desk / scheduling",
  hook:"The coworker who always knows — and never sighs.",
  sub:"Which payer covers what, what a code means, where that document went. Just ask.",
  fearQ:"“This looks complicated. Probably not for me.”",
  fearA:"If you can type a question, you're overqualified. Say “show me” and it walks your cursor through it.",
  tryits:["What does code H0019 mean?","Show me how to change my answer style","Where did my last conversation go?"],
  today:["Plain words in, plain words out","“Show me” tours for anything on screen","Your past questions live in My Vault"],
  coming:["A setup that learns what you do and surfaces just your tools"],
  tour:["chat:response-modes","▶ Watch: how answers work"]},
 {key:"phi", label:"Clinical / outreach",
  hook:"Ask freely. The compliance worrying is Mobius's job.",
  sub:"Policy answers and document questions — with patient-info guardrails built in, not bolted on.",
  fearQ:"“Is patient information safe in here?”",
  fearA:"Uploads get scanned for PHI automatically and stay private by default. Nothing shares itself.",
  tryits:["Upload this document and tell me what's in it","What's the prior auth rule for outpatient?","Who can see my uploads?"],
  today:["Upload & ask — private by default","Automatic PHI detection before anything shares","Receipts on every answer"],
  coming:["Org sharing with a hard safety gate — PHI can't be one-clicked public"],
  tour:["chat:upload-a-document","▶ Watch: upload & ask"]},
 {key:"curator", label:"Corpus / knowledge admin",
  hook:"~9,000 documents. Measured quality. Your kingdom.",
  sub:"Publish pipeline, reviewed lexicon, eval baselines that catch regressions before users do.",
  fearQ:"“Can I trust what's in the corpus?”",
  fearA:"Quality is measured, not assumed — per-page extraction status, lexicon QA, scored eval runs on every change.",
  tryits:["What's in the Public Library?","How does the publish pipeline work?","What did the last eval run score?"],
  today:["Repository UI with per-page extraction status","Human-in-the-loop lexicon review","Eval dashboard: lift vs drift"],
  coming:["Per-org private corpora with promote-from-vault"],
  tour:["chat:operations-suite-tour","▶ Watch: the ops suite"]},
 {key:"exec", label:"Ops / finance exec",
  hook:"Real claims data. Real benchmarks. Zero slideware.",
  sub:"Market size, your share, rate gaps worth actual dollars, who's growing at your expense.",
  fearQ:"“Is this real analysis or a demo?”",
  fearA:"Computed live from claims-level FL Medicaid data — 26 analytics tools, percentile benchmarks, exportable.",
  tryits:["How big is the FL Medicaid BH market?","Benchmark my organization","Where are we underpaid?"],
  today:["26 verified analytics tools","Peer-percentile benchmarks on every KPI","The Strategy deck, exportable"],
  coming:["Look-alike peer groups for sharper comparisons"],
  tour:["chat:operations-suite-tour","▶ Watch: the ops suite"]},
 {key:"expert", label:"AI-experienced user",
  hook:"Not a chatbot wrapper. Come look under the hood.",
  sub:"45-tool ReAct manifest, strategy-routed retrieval, honesty-checked composition, a registry as ground truth.",
  fearQ:"“Let me guess — GPT with a system prompt?”",
  fearA:"Open the platform schematic: 30 modules, 5 clusters, honest live/planned status on every node. Judge for yourself.",
  tryits:["Show me the platform schematic","What retrieval strategy did you just use?","Recite the Why Mobius essay"],
  today:["Strategy-routed retrieval over ~9k documents","Verified analytics from claims data","Recital-grade canonical texts, tours, download cards"],
  coming:["Answer cache with fingerprint replay","One rag(query, mode) interface"],
  tour:["chat:operations-suite-tour","▶ Watch: the ops suite"]},
 {key:"default", label:"Brand-new user",
  hook:"Ask me anything about payers, policies, or your own documents.",
  sub:"I answer with receipts, I say “I don't know” out loud, and I can walk you through anything on screen.",
  fearQ:"“What even is this?”",
  fearA:"An operations platform that talks. Behind the chat: policy corpus, market analytics, credentialing, tasks.",
  tryits:["What can Mobius do for me?","What does code H0019 mean?","Show me around"],
  today:["Cited answers to policy questions","Upload a document and ask about it","Tours whenever you're lost"],
  coming:["A workspace that grows with everything you touch"],
  tour:["chat:response-modes","▶ Watch: how answers work"]},
];
const $=id=>document.getElementById(id);
PERSONAS.forEach((p,i)=>{const o=document.createElement("option");o.value=i;o.textContent=p.label;$("cPersona").appendChild(o);});
let pillar="today", steps=[false,false,false], typing=null;
function render(){
  const p=PERSONAS[+$("cPersona").value], name=$("cName").value||"there",
        arrival=$("cArrival").value, exp=$("cExp").value;
  const opener = arrival==="invited" ? "Your org set you up. Zero forms. Let's go." :
                 "Two minutes, no tour bus — poke anything below.";
  const expLine = exp==="beginner" ? "🛟 Default settings: I explain myself and ask before acting. You cannot break anything."
    : exp==="expert" ? "⚙️ Autonomy settings can drop the training wheels whenever you're ready."
    : "";
  const pillarBody = pillar==="today"
    ? `<ul>${p.today.map(x=>`<li>${x}</li>`).join("")}</ul>`
    : pillar==="coming"
    ? `<div class="planned"><ul>${p.coming.map(x=>`<li>${x} <span style="font-size:11px">(really not built yet)</span></li>`).join("")}</ul></div>`
    : `<div class="steer">Feedback here isn't a suggestion box that eats letters — every wish files a real backlog item, and asking for something that doesn't exist <b>votes for it</b>.</div>
       <button class="wish" id="wishBtn">🎁 make a wish</button>`;
  $("card").innerHTML=`
    <h2 class="enter">Hey ${name} <span class="wave">👋</span></h2>
    <p class="hooksub enter" style="margin:2px 0 12px">${opener}</p>
    <p class="hook enter d1">${p.hook}</p>
    <p class="hooksub enter d1">${p.sub}</p>
    <div class="flip enter d2" id="flip"><div class="flip-inner">
      <div class="face q">😬 ${p.fearQ}<span class="tap">tap to flip</span></div>
      <div class="face a">✅ ${p.fearA}</div>
    </div></div>
    ${expLine?`<p class="hooksub enter d2">${expLine}</p>`:""}
    <div class="tryits enter d3">${p.tryits.map((t,i)=>`<button class="try" data-q="${t.replace(/"/g,'&quot;')}">${t}</button>`).join("")}</div>
    <div class="composer enter d3"><span class="ghost" id="ghost">tap a question — watch it type itself…</span><span class="cursor"></span><span class="send">➤</span></div>
    <div class="tabs enter d4">
      <button data-p="today" class="${pillar==="today"?"on":""}">✅ Today</button>
      <button data-p="coming" class="${pillar==="coming"?"on":""}">🔭 Coming</button>
      <button data-p="steer" class="${pillar==="steer"?"on":""}">🎁 You steer it</button>
    </div>
    <div class="pillar enter d4">${pillarBody}</div>
    <div class="setup enter d4">
      <span class="lbl">Get set up</span>
      ${["Style","Your org","First question"].map((s,i)=>`<span class="step ${steps[i]?"done":""}" data-i="${i}"><span class="dot">${steps[i]?"✓":""}</span>${s}</span>`).join("")}
      <button class="skip">skip for now</button>
    </div>
    <div class="toast" id="toast"></div>`;
  $("flip").addEventListener("click",()=>$("flip").classList.toggle("on"));
  document.querySelectorAll(".try").forEach(b=>b.addEventListener("click",()=>typeIt(b.dataset.q)));
  document.querySelectorAll(".tabs button").forEach(b=>b.addEventListener("click",()=>{pillar=b.dataset.p;render();}));
  document.querySelectorAll(".step").forEach(s=>s.addEventListener("click",()=>{
    steps[+s.dataset.i]=!steps[+s.dataset.i]; render();
    if(steps.every(Boolean)){toast("You're in. 🎉  (in product: card retires itself)");confetti();}
  }));
  const w=$("wishBtn"); if(w) w.addEventListener("click",()=>toast("Wish filed — for real, this button works in product 🎯"));
}
function typeIt(q){
  clearInterval(typing); const g=$("ghost"); g.textContent=""; let i=0;
  typing=setInterval(()=>{ g.textContent=q.slice(0,++i);
    if(i>=q.length){clearInterval(typing); toast("in product this fires in chat — for real");} },22);
}
function toast(msg){const t=$("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),2600);}
function confetti(){
  const c=$("confetti"),x=c.getContext("2d"); c.width=innerWidth; c.height=innerHeight;
  const P=Array.from({length:120},()=>({x:Math.random()*c.width,y:-20-Math.random()*80,v:2+Math.random()*3.5,r:3+Math.random()*4,a:Math.random()*6.28,
    col:["#7c3aed","#16a34a","#d97706","#60a5fa"][Math.floor(Math.random()*4)]}));
  let f=0; const go=()=>{x.clearRect(0,0,c.width,c.height);
    P.forEach(p=>{p.y+=p.v;p.x+=Math.sin(p.a+=.08)*1.6;x.fillStyle=p.col;x.fillRect(p.x,p.y,p.r,p.r*1.6);});
    if(++f<130)requestAnimationFrame(go); else x.clearRect(0,0,c.width,c.height);}; go();
}
["cName","cArrival","cPersona","cExp"].forEach(id=>$(id).addEventListener("input",render));
render();
</script>
</body>
</html>
