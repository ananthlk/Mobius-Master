<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mobius Training Mode — Prototype</title>
<style>
  /* Tokens inlined for iframe self-containment (canonical: mobius-design/tokens.css) */
  :root{--violet:#7c3aed;--violet-soft:rgba(124,58,237,.10);--bg:#f3f4f6;--surface:#fff;--surface-2:#f1eff7;--text:#1c1a27;--muted:#6b6880;--border:#e2dff0;--live:#16a34a;--planned:#94a3b8}
  @media (prefers-color-scheme: dark){:root{--bg:#0f1117;--surface:#1d1a2e;--surface-2:#262238;--text:#eceaf6;--muted:#9d99b5;--border:#332e4d;--live:#4ade80;--planned:#64748b}}
  :root[data-theme="light"]{--bg:#f3f4f6;--surface:#fff;--surface-2:#f1eff7;--text:#1c1a27;--muted:#6b6880;--border:#e2dff0;--live:#16a34a;--planned:#94a3b8}
  :root[data-theme="dark"]{--bg:#0f1117;--surface:#1d1a2e;--surface-2:#262238;--text:#eceaf6;--muted:#9d99b5;--border:#332e4d;--live:#4ade80;--planned:#64748b}
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  header{padding:9px 16px;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  header h1{font-size:14px;margin:0;font-weight:650}
  header h1 b{color:var(--violet)}
  header .note{color:var(--muted);font-size:11.5px}
  #controls{display:flex;gap:10px;flex-wrap:wrap;padding:9px 16px;border-bottom:1px solid var(--border);background:var(--surface);align-items:end}
  #controls label{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:2px}
  #controls input,#controls select{font:inherit;font-size:13px;color:var(--text);background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:5px 8px}
  #controls .mini{background:none;border:1px solid var(--border);border-radius:999px;color:var(--muted);font:inherit;font-size:12px;padding:5px 12px;cursor:pointer}
  main{max-width:620px;margin:22px auto;padding:0 16px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:20px 24px 18px;box-shadow:0 3px 16px rgba(28,26,39,.09);position:relative;overflow:hidden}
  .enter{animation:pop .4s cubic-bezier(.2,.9,.3,1.2) both}
  .enter.d1{animation-delay:.07s}.enter.d2{animation-delay:.14s}.enter.d3{animation-delay:.22s}.enter.d4{animation-delay:.3s}
  @keyframes pop{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:none}}
  /* progress */
  .prog{display:flex;gap:4px;margin:0 0 20px}
  .prog i{flex:1;height:3px;border-radius:99px;background:rgba(124,58,237,.15);transition:background .3s}
  .prog i.on{background:var(--violet)}
  h2{margin:0 0 4px;font-size:20px;display:flex;align-items:center;gap:8px}
  h2 .wave{display:inline-block;animation:wave 1.8s ease-in-out 1;transform-origin:70% 70%}
  @keyframes wave{0%,100%{transform:rotate(0)}15%{transform:rotate(18deg)}30%{transform:rotate(-8deg)}45%{transform:rotate(14deg)}60%{transform:rotate(-4deg)}}
  .sub{color:var(--muted);margin:0 0 14px;font-size:13.5px}
  .primary{background:var(--violet);color:#fff;border:none;border-radius:999px;padding:9px 22px;font:inherit;font-size:14.5px;font-weight:650;cursor:pointer;transition:transform .12s}
  .primary:hover{transform:translateY(-2px)}
  .ghostbtn{background:none;border:none;color:var(--muted);font:inherit;font-size:12.5px;cursor:pointer;text-decoration:underline}
  .row{display:flex;gap:10px;align-items:center;margin-top:14px;flex-wrap:wrap}
  /* activity grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:9px;margin:8px 0 4px}
  .act{border:1.5px solid var(--border);background:var(--surface-2);border-radius:12px;padding:11px 12px;font:inherit;font-size:13.5px;cursor:pointer;text-align:left;transition:all .15s;color:var(--text);letter-spacing:.01em}
  .act:hover{transform:translateY(-2px)}
  .act.on{border-color:var(--violet);background:var(--violet-soft);font-weight:650}
  .act .p{display:block;font-size:10.5px;color:var(--violet);margin-top:3px;font-weight:650;letter-spacing:.04em}
  /* tone samples */
  .tone{display:block;width:100%;text-align:left;font:inherit;color:var(--text);border:1.5px solid var(--border);border-radius:12px;padding:11px 14px;margin:8px 0;cursor:pointer;transition:all .15s;background:var(--surface-2)}
  .tone:hover{transform:translateX(4px)}
  .tone.on{border-color:var(--violet);background:var(--violet-soft)}
  .tone .t{font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--violet);font-weight:700}
  .tone p{margin:4px 0 0;font-size:13.5px}
  /* scenario + hesitation chips */
  .bigchip{display:block;width:100%;text-align:left;border:1.5px solid var(--border);background:var(--surface-2);border-radius:12px;padding:12px 15px;margin:8px 0;font:inherit;font-size:14px;cursor:pointer;transition:all .15s;color:var(--text)}
  .bigchip:hover{transform:translateX(4px)}
  .bigchip b{display:block}
  .bigchip.suggest{border-color:var(--violet);background:var(--violet-soft)}
  .composer input{flex:1;border:none;background:transparent;font:inherit;font-size:13.5px;color:var(--text);outline:none}
  .composer input::placeholder{color:var(--muted)}
  .composer .send{cursor:pointer}
  .bigchip span{color:var(--muted);font-size:12.5px}
  /* graduation card bits (fun edition) */
  .hook{font-size:1.1rem;margin:8px 0 2px;font-weight:700;color:var(--text)}
  .learned{display:flex;gap:7px;flex-wrap:wrap;margin:10px 0 4px}
  .learned span{background:var(--violet-soft);color:var(--violet);border-radius:999px;padding:4px 12px;font-size:12px;font-weight:650;animation:pop .35s both}
  .learned span:nth-child(2){animation-delay:.07s}.learned span:nth-child(3){animation-delay:.14s}.learned span:nth-child(4){animation-delay:.21s}
  .editnote{color:var(--muted);font-size:11.5px;margin:2px 0 12px}
  .flip{perspective:700px;margin:6px 0 14px;cursor:pointer;user-select:none}
  .flip-inner{position:relative;transition:transform .5s;transform-style:preserve-3d;min-height:52px}
  .flip.on .flip-inner{transform:rotateX(180deg)}
  .face{position:absolute;inset:0;backface-visibility:hidden;border-radius:12px;display:flex;align-items:center;gap:10px;padding:10px 14px;font-size:14px}
  .face.q{background:var(--violet-soft);font-weight:600}
  .face.q .tap{margin-left:auto;font-size:11px;color:var(--violet);font-weight:650;white-space:nowrap}
  .face.a{background:color-mix(in srgb,var(--live) 10%,transparent);transform:rotateX(180deg)}
  .tryits{display:flex;gap:8px;flex-wrap:wrap;margin:4px 0 10px}
  .try{border:1px solid rgba(124,58,237,.25);color:var(--violet);background:rgba(124,58,237,.06);border-radius:999px;padding:7px 14px;font:inherit;font-size:13.5px;cursor:pointer;transition:transform .12s, background .12s}
  .try:hover{transform:translateY(-2px) scale(1.03);background:var(--violet-soft)}
  .composer{display:flex;align-items:center;gap:9px;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:10px 14px;margin:4px 0 16px;min-height:42px}
  .composer .cursor{width:2px;height:17px;background:var(--violet);animation:blink 1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}
  .composer .ghost{color:var(--muted);font-size:13.5px}
  .composer .send{margin-left:auto;color:var(--violet);font-weight:700}
  .tabs{display:flex;gap:6px;margin:2px 0 10px}
  .tabs button{border:1px solid var(--border);background:var(--surface-2);color:var(--muted);border-radius:999px;padding:5px 13px;font:inherit;font-size:12.5px;cursor:pointer;font-weight:600}
  .tabs button.on{background:var(--violet);border-color:var(--violet);color:#fff}
  .pillar{min-height:80px}
  .pillar ul{margin:4px 0 0;padding-left:20px}
  .pillar li{margin:5px 0}
  .pillar .planned li{color:var(--muted)}
  .pillar .steer{border-left:3px solid var(--live);padding:2px 0 2px 11px;font-size:14px;margin-top:4px}
  .wish{margin-top:8px;border:1px dashed var(--live);color:var(--live);background:transparent;border-radius:999px;padding:5px 13px;font:inherit;font-size:12.5px;cursor:pointer}
  .toast{position:absolute;left:50%;transform:translateX(-50%);bottom:14px;background:var(--text);color:var(--bg);border-radius:99px;padding:10px 20px;font-size:12.5px;opacity:0;transition:opacity .25s;pointer-events:none;max-width:90%;text-align:center}
  .toast.show{opacity:1}
  canvas#confetti{position:fixed;inset:0;pointer-events:none;z-index:9}
  .meta{color:var(--muted);font-size:11.5px;margin-top:12px;text-align:center}
</style>
</head>
<body>
<header>
  <h1>Training Mode <b>·</b> Prototype</h1>
  <span class="note">every answer below writes a REAL preference in product · cheat codes <code>/training</code> · <code>/welcome</code></span>
</header>
<div id="controls">
  <div><label>Name</label><input id="cName" value="Ananth" size="8"></div>
  <div><label>Arrival</label><select id="cArrival"><option value="invited">invited</option><option value="self_serve">self-serve</option></select></div>
  <button class="mini" id="restart">↻ restart training</button>
  <button class="mini" id="skipTo">⏭ skip to graduation</button>
</div>
<main><div id="card" class="card"></div>
<p class="meta">Prototype: picks are simulated locally. In product each pick saves via the User Manager's preferences API — show, don't survey. Spec: docs/welcome-onboarding-spec.md §Training</p>
</main>
<canvas id="confetti"></canvas>
<script>
"use strict";
/* ======== TRAINING MODE v2 — interaction IS the profiling ======== */
const SCENARIOS=[
 {k:"transport",label:"🚌 A patient can't get to appointments — transportation help?",act:"patient_outreach",persona:"phi",
  q:"Does Medicaid cover rides to behavioral-health appointments?",
  tones:[["professional","Yes — FL Medicaid covers non-emergency transportation to behavioral-health visits. Rides are arranged through the plan's transportation broker; most plans want 1–3 days' notice. Source: member handbook, transportation section."],
         ["friendly","Good news — yes! Medicaid covers rides to appointments 🚌 You book through the plan's ride line, usually a couple of days ahead. I've got the number and the steps whenever you need them."],
         ["concise","Yes — NEMT covered. Book via plan broker, 1–3 days ahead. [src]"]],
  depths:[["beginner","Yes, covered ✅ Here's how it works: every FL Medicaid plan includes free rides to covered appointments — it's called NEMT. To set one up, call the plan's ride line with the appointment details, ideally 3 days ahead. Want me to pull this patient's plan, get its exact booking number, and walk you through the first booking?"],
          ["regular","Yes — NEMT is covered ✅ Book through the plan's broker ~1–3 days ahead. Want the plan-specific booking line?"],
          ["expert","Covered ✅ NEMT via plan broker; 1–3d notice; standing-order option for recurring visits. Pull member's plan → broker line? Routing: corpus (handbook) + registry contact."]]},
 {k:"pcp",label:"🩺 A patient needs a PCP assigned (or wants to switch)",act:"check_in_patients",persona:"frontdesk",
  q:"How does a member change their PCP?",
  tones:[["professional","A member can change their PCP through the plan — via the member portal or member services. Changes typically take effect the first of the following month. Source: plan member handbook."],
         ["friendly","Totally doable — the member (or you, with them on the line) calls member services or uses the portal, picks the new PCP, and it usually kicks in on the 1st of next month 👍"],
         ["concise","Portal or member services. Effective 1st of next month. [src]"]],
  depths:[["beginner","Here's the whole path ✅ The member calls the plan's member-services line (or uses the portal) and requests the change; it usually takes effect the 1st of the following month. If it's urgent — like no assigned PCP at all — plans can expedite. Want me to look up this plan's member-services number and what counts as urgent?"],
          ["regular","Plan portal or member services; effective 1st of next month; urgent assignments can be expedited ✅ Want the plan's number?"],
          ["expert","Portal/MS line; eff. 1st next mo.; expedite path for unassigned members. Registry has the MS number. Pull it?"]]},
 {k:"denial",label:"❌ A claim came back denied — now what?",act:"rework_denials",persona:"claims",
  q:"Why was this claim denied and how do I fix it?",
  tones:[["professional","This denial is CARC 197 — prior authorization not on file. It is typically recoverable: request a retroactive authorization if the payer allows it, or appeal with medical-necessity documentation. I can draft the appeal."],
         ["friendly","Okay, decoding it: the payer says no prior auth was on file (CARC 197). Fixable! We either chase a retro-auth or appeal it — I can draft the letter for you 💪"],
         ["concise","CARC 197: no prior auth. Fix: retro-auth or appeal. Draft on request."]],
  depths:[["beginner","The code on this denial (CARC 197) means the payer didn't find a prior authorization ✅ What that means: this service needed pre-approval. Two ways forward — ask the payer for a retroactive auth (some allow it), or appeal with documentation. I can check this payer's exact rules and draft the appeal with you. Start there?"],
          ["regular","CARC 197 — missing prior auth ✅ This payer allows retro-auth requests; otherwise appeal. Draft the letter?"],
          ["expert","197 · no PA on file. Retro window per payer playbook; else appeal w/ med-nec. appeals_assemble_letter ready. Routing: appeals rules + payor registry."]]},
 {k:"newprov",label:"🪪 A new clinician needs to start billing",act:"credentialing",persona:"credentialing",
  q:"Is our new clinician enrolled with Medicaid yet?",
  tones:[["professional","Your new clinician is not yet on the PML — enrollment is pending. Claims billed before the effective date will deny. I can flag you the moment the status flips."],
         ["friendly","Checked! They're not on the state roster yet — enrollment's still cooking. Hold claims until it flips (I'll watch it and nudge you the day it does) 🎯"],
         ["concise","Not on PML yet. Hold claims. Watch + notify on flip."]],
  depths:[["beginner","Not enrolled yet ✅ Here's what that means: until the state lists them (the PML), any claim under their NPI will deny. What to do: hold their claims, and I'll watch the roster and tell you the day they're payable. Want me to also show you their full credentialing card?"],
          ["regular","Pending — not on PML yet ✅ Hold claims; I'll notify on the flip. Want the credentialing card?"],
          ["expert","PML: absent. NPPES: active. Hold claims; watcher set on status flip. check_provider_credentialing for the full panel view."]]},
 {k:"coverage",label:"📄 Not sure what a payer actually covers",act:"submit_claims",persona:"claims",
  q:"Does this payer cover this service via telehealth?",
  tones:[["professional","Yes — this payer covers that service via telehealth, with a GT/95 modifier requirement and parity payment. Source: payer telehealth policy, p.12."],
         ["friendly","Yes — covered over telehealth! Just remember the telehealth modifier on the claim. Want me to pin the exact policy page for your team?"],
         ["concise","Covered via telehealth. Modifier required. [src p.12]"]],
  depths:[["beginner","Yes, it's covered via telehealth ✅ One thing to get right: the claim needs a telehealth modifier or it may deny. Here's the exact policy page as your receipt. Want me to note which of your common services have telehealth quirks like this?"],
          ["regular","Covered via telehealth, modifier required ✅ Policy page attached. Want the full telehealth rules for this payer?"],
          ["expert","Covered; parity; GT/95 modifier req. Source pinned. Cross-payer telehealth matrix available on ask."]]},
 {k:"rates",label:"📈 Are we getting paid fairly for this service?",act:"strategy",persona:"exec",
  q:"What's the market rate for this service code?",
  tones:[["professional","Your realized rate on this code is at the 34th percentile of comparable providers — the market median would be worth materially more per unit. I can quantify the annual gap."],
         ["friendly","Straight answer: you're below market on this one — 34th percentile. The median would put real dollars back per unit. Want the annual gap number?"],
         ["concise","P34 vs market. Gap material. Annualized number on request."]],
  depths:[["beginner","You're being paid below market on this code ✅ What that means: comparable providers get more per unit — you're at the 34th percentile, from real claims data. Want me to show the annual dollar gap and which peer group I compared you against?"],
          ["regular","P34 vs peers on this code ✅ Median would be worth $X/unit more. Annualized gap + peer group on request."],
          ["expert","P34 realized vs peer P50; claims-level basis; get_org_rate_gap for annualized + get_rate_trends for trajectory."]]},
];
const AUTONOMY=[
 {k:"automatic",b:"Just handle it",s:"I'll act on routine things and tell you after.",exp:"expert",toast:"Bold. I'll handle routine things — sensitive ones still get your sign-off. Always."},
 {k:"confirm_first",b:"Show me before you act",s:"I'll line it up, you press go.",exp:"regular",toast:"Deal. I stage, you approve — that's enforced, not a vibe."},
 {k:"manual",b:"Walk me through it",s:"We do it together, step by step.",exp:"beginner",toast:"Perfect. I'll explain everything and never act without you. You can't break anything."},
];
const HESITATIONS=[
 {k:"wrong",b:"It'll get things wrong",emo:"😬",fearQ:"“What if it's wrong — it's my name on this.”",fearA:"No source, no claim. Every answer shows receipts — click any citation. Unsure? I say so out loud."},
 {k:"phi",b:"Patient data safety",emo:"🔒",fearQ:"“Is patient information safe in here?”",fearA:"Uploads get scanned for PHI automatically and stay private by default. Nothing shares itself."},
 {k:"complex",b:"Too complicated for me",emo:"🤯",fearQ:"“This looks complicated…”",fearA:"You just did the hardest part — clicking buttons. Say “show me” anytime and I'll walk your cursor through it."},
 {k:"none",b:"Honestly? Nothing 😎",emo:"😎",fearQ:"“Impress me.”",fearA:"Open the platform schematic — 30 modules, honest live/planned status on every one. Then ask me anything on it."},
];
const PERSONAS={
 claims:{hook:"Denials, codes, timely filing — answered with receipts.",tryits:["What's the timely filing rule for Sunshine?","Is Dr. Chen enrolled with Medicaid?","Remind me to rework that H0019 denial"],today:["Cited policy answers in seconds","Enrollment checks before you bill","Plain-word reminders that nudge back"],coming:["Per-claim validation ledger","Instant answers for repeat questions"]},
 credentialing:{hook:"“Is this provider payable?” — one question, whole answer.",tryits:["How is our panel doing?","NPPES errors for Acme Health?","Show me the credentialing report"],today:["Provider or panel status from one question","Ghost-billing + gap checks","Runs create follow-up tasks themselves"],coming:["Tasks that close themselves on run completion","Richer credentialing workspace"]},
 frontdesk:{hook:"The coworker who always knows — and never sighs.",tryits:["What does code H0019 mean?","Show me how to change my answer style","Where did my last conversation go?"],today:["Plain words in, plain words out","“Show me” tours for anything on screen","Past questions live in My Vault"],coming:["A setup that surfaces just your tools"]},
 phi:{hook:"Ask freely. The compliance worrying is my job.",tryits:["Upload this document and tell me what's in it","What's the prior auth rule for outpatient?","Who can see my uploads?"],today:["Upload & ask — private by default","Automatic PHI detection before anything shares","Receipts on every answer"],coming:["Org sharing behind a hard PHI gate"]},
 curator:{hook:"~9,000 documents. Measured quality. Your kingdom.",tryits:["What's in the Public Library?","How does the publish pipeline work?","What did the last eval run score?"],today:["Per-page extraction status","Human-in-the-loop lexicon review","Eval dashboard: lift vs drift"],coming:["Per-org corpora with promote-from-vault"]},
 exec:{hook:"Real claims data. Real benchmarks. Zero slideware.",tryits:["How big is the FL Medicaid BH market?","Benchmark my organization","Where are we underpaid?"],today:["26 verified analytics tools","Peer-percentile benchmarks on every KPI","The Strategy deck, exportable"],coming:["Look-alike peer groups"]},
 default:{hook:"Ask me anything about payers, policies, or your documents.",tryits:["What can Mobius do for me?","What does code H0019 mean?","Show me around"],today:["Cited answers to policy questions","Upload a document and ask about it","Tours whenever you're lost"],coming:["A workspace that grows with you"]},
};
const $=id=>document.getElementById(id);
let T={step:0,acts:[],tone:null,auto:null,exp:null,hesList:[],pillar:"today",dots:[false,false,false],typing:null};
function persona(){ if(!T.acts.length) return "default"; const sc=SCENARIOS.find(x=>x.k===T.acts[0]); return sc?sc.persona:"default"; }
function mainScenario(){ return SCENARIOS.find(x=>x.k===T.acts[0]) || SCENARIOS[2]; }
function prog(n){ return `<div class="prog">${[0,1,2,3,4].map(i=>`<i class="${i<n?"on":""}"></i>`).join("")}</div>`; }
function render(){
  const name=$("cName").value||"there", arrival=$("cArrival").value, c=$("card");
  if(T.step===0){ c.innerHTML=`${prog(0)}
    <h2 class="enter">Hey ${name} <span class="wave">👋</span> I'm Mobius.</h2>
    <p class="sub enter d1">${arrival==="invited"?"Your org set you up — zero forms.":"Welcome in."} Give me <b>90 seconds</b>: you click, I learn how you like to work. You can retrain me anytime.</p>
    <div class="row enter d2"><button class="primary" id="go">Let's go →</button>
    <button class="ghostbtn" id="skip">skip — I'll explore on my own</button></div>`;
    $("go").onclick=()=>{T.step=1;render();};
    $("skip").onclick=()=>{T.step=5;render();toast("No pressure — training is in the sidebar whenever.");};
  }
  else if(T.step===1){ c.innerHTML=`${prog(1)}
    <h2 class="enter">What walked through your door this week?</h2>
    <p class="sub enter">Pick the situations you actually deal with — your first pick becomes the thread we'll use to tune everything.</p>
    <div class="grid enter d1">${SCENARIOS.map(a=>`<button class="act ${T.acts.includes(a.k)?"on":""}" data-k="${a.k}">${a.label}${T.acts[0]===a.k?'<span class="p">★ YOUR MAIN THING</span>':""}</button>`).join("")}</div>
    <div class="row"><button class="primary" ${T.acts.length?"":"disabled style='opacity:.4'"} id="next">That's me →</button></div>`;
    c.querySelectorAll(".act").forEach(b=>b.onclick=()=>{const k=b.dataset.k;
      T.acts=T.acts.includes(k)?T.acts.filter(x=>x!==k):[...T.acts,k];render();});
    const n=$("next"); if(n) n.onclick=()=>{if(T.acts.length){T.step=2;render();}};
  }
  else if(T.step===2){ const sc=mainScenario(); c.innerHTML=`${prog(2)}
    <h2 class="enter">Your situation. Three ways to answer it.</h2>
    <p class="sub enter">You asked: <b>“${sc.q}”</b> — no labels, no right answer. Just tap the reply you'd rather read:</p>
    ${sc.tones.map((t,i)=>`<button type="button" class="tone enter d${i+1}" data-k="${t[0]}"><p>${t[1]}</p></button>`).join("")}`;
    c.querySelectorAll(".tone").forEach(el=>el.onclick=()=>{T.tone=el.dataset.k;T.step=3;render();
      toast("Got it — that's how I'll sound from now on. (Change anytime.)");});
  }
  else if(T.step===3){
    if(!T.auto){ c.innerHTML=`${prog(3)}
      <h2 class="enter">A denial needs reworking.</h2>
      <p class="sub enter">Real scenario — this is <b>sensitive</b> territory (billing). I found the fix. What should I do?</p>
      ${AUTONOMY.map((a,i)=>`<button class="bigchip enter d${i+1}" data-k="${a.k}"><b>${a.b}</b><span>${a.s}</span></button>`).join("")}`;
      c.querySelectorAll(".bigchip").forEach(b=>b.onclick=()=>{T.auto=AUTONOMY.find(a=>a.k===b.dataset.k);render();toast(T.auto.toast);});
    } else { const sc=mainScenario(); c.innerHTML=`${prog(3)}
      <h2 class="enter">Deal: “${T.auto.b}” for sensitive work.</h2>
      <p class="sub enter">One more calibration — <b>how much should I explain?</b> Same question — <b>“${sc.q}”</b> — three depths. Tap the response you'd actually want to read; this is really how I'll answer you:</p>
      ${sc.depths.map((d,i)=>`<button type="button" class="tone enter d${i+1}" data-k="${d[0]}"><p>${d[1]}</p></button>`).join("")}`;
      c.querySelectorAll(".tone").forEach(b=>b.onclick=()=>{T.exp=b.dataset.k;T.step=4;render();toast("Got it — that's the depth you'll get. Dial it up or down anytime.");});
    }
  }
  else if(T.step===4){ c.innerHTML=`${prog(4)}
    <h2 class="enter">Last one. Anything make you hesitant?</h2>
    <p class="sub enter">Pick all that apply — honest answers get honest features. (Optional.)</p>
    ${HESITATIONS.map((h,i)=>`<button class="bigchip enter d${i+1} ${T.hesList.includes(h.k)?"suggest":""}" data-k="${h.k}"><b>${h.b}${T.hesList.includes(h.k)?" ✓":""}</b></button>`).join("")}
    <div class="row"><button class="primary" id="doneh">${T.hesList.length?"That's them →":"Nothing, honestly →"}</button>
    <button class="ghostbtn" id="skiph">skip this one</button></div>`;
    c.querySelectorAll(".bigchip").forEach(b=>b.onclick=()=>{const k=b.dataset.k;
      T.hesList=T.hesList.includes(k)?T.hesList.filter(x=>x!==k):[...T.hesList,k];render();});
    $("doneh").onclick=()=>{T.step=5;render();confetti();};
    $("skiph").onclick=()=>{T.hesList=[];T.step=5;render();confetti();};
  }
  else graduation();
}
function graduation(){
  const name=$("cName").value||"there", p=PERSONAS[persona()],
        hes=T.hesList.length?HESITATIONS.find(h=>h.k===T.hesList[0]):HESITATIONS[0];
  const actLabels=T.acts.map(k=>SCENARIOS.find(a=>a.k===k).label.replace(/^\S+ /,"").replace(/ —.*$/,"").replace(/\?$/,""));
  const learned=[
    actLabels.length?`★ ${actLabels[0]}${actLabels.length>1?" +"+(actLabels.length-1):""}`:"explorer mode",
    T.tone?`🗣 ${T.tone}`:"🗣 professional (default)",
    T.auto?`🎚 ${T.auto.b.toLowerCase()} (sensitive)`:"🎚 show me first (default)",
    T.exp?`🧠 ${T.exp}`:null,
    T.hesList.length?`😬 ${HESITATIONS.find(h=>h.k===T.hesList[0]).b.toLowerCase()}${T.hesList.length>1?" +"+(T.hesList.length-1):""}`:null].filter(Boolean);
  const expLine=T.exp==="beginner"?"🛟 I explain myself and never act without you — locked in from your picks.":
                T.exp==="expert"?"⚙️ Training wheels off where you allowed it — sensitive things still get your sign-off.":"";
  const pillarBody=T.pillar==="today"?`<ul>${p.today.map(x=>`<li>${x}</li>`).join("")}</ul>`
    :T.pillar==="coming"?`<div class="planned"><ul>${p.coming.map(x=>`<li>${x} <span style="font-size:11px">(really not built yet)</span></li>`).join("")}</ul></div>`
    :`<div class="steer">Wishes here aren't a suggestion box that eats letters — each one files a real backlog item, and asking for something that doesn't exist <b>votes for it</b>.</div><button class="wish" id="wishBtn">🎁 make a wish</button>`;
  $("card").innerHTML=`${prog(5)}
    <h2 class="enter">Trained. Here's your Mobius, ${name} 🎓</h2>
    <div class="learned enter">${learned.map(x=>`<span>${x}</span>`).join("")}</div>
    <p class="editnote enter">That's what I learned — edit any of it in Preferences, or hit ↻ to retrain me.</p>
    <p class="hook enter d1">${p.hook}</p>
    <div class="flip enter d1" id="flip"><div class="flip-inner">
      <div class="face q">${hes.emo} ${hes.fearQ}<span class="tap">tap to flip</span></div>
      <div class="face a">✅ ${hes.fearA}</div></div></div>
    ${expLine?`<p class="sub enter d2">${expLine}</p>`:""}
    <div class="tryits enter d2">${(T.acts.length?T.acts.slice(0,3).map(k=>SCENARIOS.find(a=>a.k===k).q):p.tryits).map(t=>`<button class="try" data-q="${t.replace(/"/g,'&quot;')}">${t}</button>`).join("")}</div>
    <div class="composer enter d2"><input id="ci" placeholder="ask what YOU actually came here for — or tap a starter above"><span class="send" id="fire">➤</span></div>
    <div class="tabs enter d3">
      <button data-p="today" class="${T.pillar==="today"?"on":""}">✅ Today</button>
      <button data-p="coming" class="${T.pillar==="coming"?"on":""}">🔭 Coming</button>
      <button data-p="steer" class="${T.pillar==="steer"?"on":""}">🎁 You steer it</button></div>
    <div class="pillar enter d3">${pillarBody}</div>
    <div class="toast" id="toast"></div>`;
  $("flip").onclick=()=>$("flip").classList.toggle("on");
  document.querySelectorAll(".try").forEach(b=>b.onclick=()=>typeIt(b.dataset.q));
  $("fire").onclick=fireIntent; $("ci").addEventListener("keydown",e=>{if(e.key==="Enter")fireIntent();});
  document.querySelectorAll(".tabs button").forEach(b=>b.onclick=()=>{T.pillar=b.dataset.p;graduation();});
  const w=$("wishBtn"); if(w) w.onclick=()=>toast("Wish filed — for real, this button works in product 🎯");
}
function typeIt(q){clearInterval(T.typing);const g=$("ci");g.value="";let i=0;
  T.typing=setInterval(()=>{g.value=q.slice(0,++i);
    if(i>=q.length){clearInterval(T.typing);toast("a starter — edit it, or ask your own. Then ➤");}},22);}
function fireIntent(){const v=($("ci").value||"").trim();
  if(!v){toast("type anything — what YOU came for is the point");return;}
  toast("🎯 captured as your first intent — in product: fires in chat + teaches Mobius what you came for (unanswerable → files a real gap)");}
function toast(msg){let t=$("toast");
  if(!t){t=document.createElement("div");t.className="toast";t.id="toast";$("card").appendChild(t);}
  t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2800);}
function confetti(){const c=$("confetti"),x=c.getContext("2d");c.width=innerWidth;c.height=innerHeight;
  const P=Array.from({length:130},()=>({x:Math.random()*c.width,y:-20-Math.random()*80,v:2+Math.random()*3.5,r:3+Math.random()*4,a:Math.random()*6.28,
    col:["#7c3aed","#16a34a","#d97706","#60a5fa"][Math.floor(Math.random()*4)]}));
  let f=0;const go=()=>{x.clearRect(0,0,c.width,c.height);
    P.forEach(p=>{p.y+=p.v;p.x+=Math.sin(p.a+=.08)*1.6;x.fillStyle=p.col;x.fillRect(p.x,p.y,p.r,p.r*1.6);});
    if(++f<140)requestAnimationFrame(go);else x.clearRect(0,0,c.width,c.height);};go();}
$("restart").onclick=()=>{T={step:0,acts:[],tone:null,auto:null,exp:null,hesList:[],pillar:"today",dots:[false,false,false],typing:null};render();};
$("skipTo").onclick=()=>{T.step=5;render();};
["cName","cArrival"].forEach(id=>$(id).addEventListener("input",()=>render()));
render();
</script>
</body>
</html>
