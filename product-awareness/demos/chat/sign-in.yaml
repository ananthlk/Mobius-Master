# chat:sign-in v2 — flow updated for the user-menu intermediate (rev 00467+ drift:
# clicking sidebar-user opens a menu; the auth modal appears on the Sign-in item).
# menu-sign-in is runtime-constructed (createUserMenu, app.js:1546) — verified live
# by Interact on rev 00494 + Chat Agent bundle confirmation.
schema: interact.v1
id: chat:sign-in
title: Sign in to Mobius
mode: guide
surface: mobius-chat
permissions: []
preconditions:
  - selector: "[data-tour-id=sidebar-user]"
steps:
  - find: "[data-tour-id=sidebar-user]"
    action: highlight
    caption: "Your account lives here, at the bottom of the sidebar — it shows who's signed in."
  - find: "[data-tour-id=sidebar-user]"
    action: click
    caption: "Click it to open your account menu…"
    wait_for: "[data-tour-id=menu-sign-in]"
  - find: "[data-tour-id=menu-sign-in]"
    action: click
    caption: "…then choose sign in ('Not you? Sign in differently')."
    wait_for: "[data-tour-id=modal-auth]"
  - find: "[data-tour-id=modal-auth]"
    action: highlight
    caption: "Sign in with your email + password, or one click with Google. Invited by your org? Use the set-password link from your email first — Google sign-in doesn't activate invited accounts."
    end: true
