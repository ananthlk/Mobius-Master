# chat:operations-suite-tour — TOP measured demand (4/6 docs_gap verbatims = Public Library).
schema: interact.v1
id: chat:operations-suite-tour
title: Tour the Operations Suite
mode: guide
surface: mobius-chat
permissions: []
preconditions:
  - selector: "[data-tour-id=sidebar-suite-library]"
steps:
  - find: "[data-tour-id=sidebar-suite-library]"
    action: highlight
    caption: "The Public Library — our shared knowledge base: payer manuals, regulations, public sources. Opens in a new tab; it's where chat's cited documents live."
  - find: "[data-tour-id=sidebar-suite-strategy]"
    action: highlight
    caption: "Strategy — benchmarking and KPIs: the FL Medicaid market-intelligence deck."
  - find: "[data-tour-id=sidebar-suite-roster]"
    action: highlight
    caption: "Roster — provider directory + credentialing. Coming soon (credentialing was folded into it)."
  - find: "[data-tour-id=sidebar-suite-vault]"
    action: highlight
    caption: "Vault — the private counterpart to the Public Library: your org's own documents in isolated namespaces. Coming soon."
  - find: "[data-tour-id=sidebar-skills-info]"
    action: highlight
    caption: "And 'Learn more about chat skills' shows everything chat itself can do. Tiles open in a new tab — your chat stays right here."
    end: true
